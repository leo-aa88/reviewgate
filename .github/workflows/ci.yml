name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package, tests, and app persistence extras
        run: pip install -e ".[dev,app]"

      - name: Run tests
        run: pytest -q

  alembic-smoke:
    name: Alembic upgrade/downgrade (Postgres 16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reviewgate
          POSTGRES_PASSWORD: reviewgate
          POSTGRES_DB: reviewgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reviewgate -d reviewgate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with app extras
        run: pip install -e ".[app]"

      - name: Run Alembic upgrade then downgrade
        env:
          REVIEWGATE_DATABASE_URL: postgresql+psycopg://reviewgate:reviewgate@127.0.0.1:5432/reviewgate
        run: |
          alembic upgrade head
          alembic downgrade base

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: [test, alembic-smoke]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
