name: PR LLM review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    # Poll for open PRs (cheap no-op when none); dedupes by head SHA in comments.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: pr-llm-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  review:
    # Fork PRs: token cannot comment; skip (same as hosted Actions security model).
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run LLM review script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
        run: python3 scripts/post_pr_llm_review.py
