name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package, test tools, and app extras
        run: pip install -e ".[dev,app]"

      - name: Run tests
        run: pytest -q

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build and verification tools
        run: pip install --upgrade build twine

      - name: Verify tag matches pyproject.toml version
        if: github.event_name == 'push'
        id: version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##*/}"        # refs/tags/v0.1.0 -> v0.1.0
          tag_version="${tag#v}"
          pyproject_version="$(python -c 'import tomllib,sys; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')"
          if [ "${tag_version}" != "${pyproject_version}" ]; then
            echo "::error::tag (${tag_version}) does not match pyproject.toml version (${pyproject_version})"
            exit 1
          fi
          echo "version=${pyproject_version}" >> "${GITHUB_OUTPUT}"

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify distributions
        run: python -m twine check dist/*

      - name: Smoke installed wheel
        run: |
          set -euo pipefail
          python -m venv /tmp/reviewgate-wheel-smoke
          wheel="$(python - <<'PY'
          import pathlib

          wheels = sorted(pathlib.Path("dist").glob("reviewgate-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {len(wheels)}")
          print(wheels[0])
          PY
          )"
          /tmp/reviewgate-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/reviewgate-wheel-smoke/bin/python -m pip install "${wheel}[app]"
          /tmp/reviewgate-wheel-smoke/bin/reviewgate-core --help
          /tmp/reviewgate-wheel-smoke/bin/python - <<'PY'
          import importlib.util

          for module in ("reviewgate", "reviewgate.app", "reviewgate_action"):
              if importlib.util.find_spec(module) is None:
                  raise SystemExit(f"missing import spec for {module}")
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##*/}"
          gh release create "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${tag}" \
            --notes-file CHANGELOG.md \
            --verify-tag \
            dist/*

  pypi-publish:
    name: Publish to PyPI (trusted publisher)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/reviewgate
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
