[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "reviewgate"
version = "0.0.0"
description = "ReviewGate: deterministic PR reviewability engine and hosted GitHub App."
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "ReviewGate contributors" }]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["reviewgate"]
