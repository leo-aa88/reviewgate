[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "reviewgate"
version = "0.0.0"
description = "reviewgate-core: deterministic PR reviewability engine for ReviewGate (open-source package; see docs/DESIGN.md)."
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "ReviewGate contributors" }]

dependencies = [
    "pydantic>=2.7",
    "PyYAML>=6.0",
]

[project.scripts]
# Local-fixture CLI per DESIGN.md §5.1 / §25 M1; see src/reviewgate/core/cli.py.
reviewgate-core = "reviewgate.core.cli:main"

[project.optional-dependencies]
# `types-PyYAML` is a stub-only package: PyYAML 6.x ships no inline type
# information, so consumers running `mypy --strict` (or pyright) need the
# stubs to keep the deterministic engine free of `Any`-by-import. It is a
# dev-only dependency; no runtime code imports from `types-PyYAML`.
dev = [
    "pytest>=8.0",
    "types-PyYAML>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/reviewgate"]
