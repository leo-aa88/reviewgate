[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "reviewgate"
version = "0.0.0"
description = "reviewgate-core: deterministic PR reviewability engine for ReviewGate (open-source package; see docs/DESIGN.md)."
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "ReviewGate contributors" }]

dependencies = [
    "pydantic>=2.7",
    "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "types-PyYAML>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.hatch.build.targets.wheel]
packages = ["src/reviewgate"]
