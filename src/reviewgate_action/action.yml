# reviewgate-action: GitHub Action wrapper around the deterministic engine (`reviewgate.core`; DESIGN.md §14).
#
# This file is the Action's public contract. Inputs and their default
# values must stay in sync with §14 of `docs/DESIGN.md`; the §24.4
# manual QA checklist (Milestone 8) verifies the documented snippet.
#
# Usage (verbatim from §14):
#
#     - uses: leo-aa88/reviewgate/src/reviewgate_action@main
#       with:
#         github-token: ${{ secrets.GITHUB_TOKEN }}
#         fail-on: FAIL
#         post-comment: true
#
# Note on the `uses:` path: GitHub Actions resolves
# ``{owner}/{repo}/{path}@{ref}`` as the subdirectory action at
# ``{path}/action.yml`` in ``{owner}/{repo}``. See the official
# "Using actions" docs ("Referencing an action in the same
# repository where a workflow file uses the action" and "Referencing
# an action in a different repository"). This Action's `action.yml`
# lives at ``src/reviewgate_action/action.yml``, so the documented
# ``leo-aa88/reviewgate/src/reviewgate_action@main`` form is the
# correct pre-release subdirectory reference -- it is not a
# `{owner}/{repo}@{ref}` typo. After the first public release, pin the
# release tag instead of ``@main``. The form survives the future split into the standalone
# ``reviewgate/reviewgate-action`` repository because the `<path>`
# segment simply collapses out.
#
# Pipeline (DESIGN.md §14, §14.1, §13; `fetch_pr` / `run_core` wiring: issues #24–#26):
#
#   1. setup-python pins the runtime so `reviewgate.core` and the
#      Action's stdlib HTTP client behave identically across runners.
#   2. `pip install` adds the `reviewgate` distribution (console script
#      `reviewgate-core` for the deterministic engine) plus the Action
#      runtime modules on the path. The install is editable when the
#      Action is used from inside this repository so a local change is
#      picked up without a re-publish.
#   3. `reviewgate_action.fetch_pr` reads `GITHUB_TOKEN`,
#      `GITHUB_REPOSITORY`, and `GITHUB_EVENT_PATH`, calls the
#      GitHub REST API (with documented pagination), and writes a
#      §10.1 EngineInput JSON document.
#   4. `reviewgate_action.run_core` loads `.reviewgate.yml`, runs
#      `reviewgate.core.engine.analyze`, writes the §10.2 JSON report
#      to the path passed as `--output-json`, prints a human summary to
#      stderr and to `$GITHUB_STEP_SUMMARY` when set, applies the §14
#      `fail-on` policy (exit 1 at threshold, exit 0 below it; `never`
#      always exits 0), resolves §14.1 coexistence via
#      `reviewgate_action.coexistence.decide` from `mode` + repo config,
#      and when `post-comment: true` and coexistence allows the Action
#      to own output, upserts the §13 marker comment via
#      `reviewgate_action.post_comment` (requires `pull-requests: write`).

name: ReviewGate
description: >-
  Run the reviewgate-core deterministic reviewability engine on a pull
  request. Optionally posts a summary comment and fails the workflow
  when the configured threshold is reached. See DESIGN.md §14.
author: ReviewGate contributors
branding:
  icon: check-square
  color: blue

inputs:
  github-token:
    description: >-
      GitHub token used to fetch PR metadata and (when `post-comment`
      is true) post the summary comment. The token needs at minimum
      `pull-requests: read` and `contents: read` to fetch PR metadata
      and the paginated changed-files list; granting
      `pull-requests: write` is required for `post-comment: true`.
      Required; no default per §14.
    required: true

  fail-on:
    description: >-
      Reviewability verdict (or stronger) at which the workflow exits
      non-zero. One of `PASS`, `WARN`, `FAIL`, or `never`. Default
      `FAIL` per §14.
    required: false
    default: FAIL

  post-comment:
    description: >-
      When `true`, post or upsert the §13 ReviewGate marker comment on
      the PR when §14.1 coexistence allows the Action to post (skipped
      in `quiet` mode or when `.reviewgate.yml` pins `mode: app` and
      `mode` is `auto`). The job summary and `report-json` output are
      always written when `run_core` completes successfully, regardless
      of this flag. Default `true` per §14.
    required: false
    default: "true"

  mode:
    description: >-
      Coexistence mode with the hosted ReviewGate App (§14.1). One of
      `auto`, `action`, or `quiet`. `auto` (the default per §14)
      defers to `.reviewgate.yml` and skips PR comments plus `fail-on`
      enforcement when the file pins `mode: app`. `action` forces the
      Action to own posting; `quiet` never posts and ignores `fail-on`.
    required: false
    default: auto

  python-version:
    description: >-
      Python version pin for `actions/setup-python`. The §15 stack
      requires Python 3.12+; consumers can override to a newer
      patch release without editing the Action. Default `3.12`.
    required: false
    default: "3.12"

  working-directory:
    description: >-
      Workspace root used to look up `.reviewgate.yml`. Defaults to
      `$GITHUB_WORKSPACE`, the repository checkout root populated by
      `actions/checkout@v4`. Override only for non-standard checkouts
      (e.g. monorepo subdirectory pinned via `actions/checkout`'s
      `path:` input).
    required: false
    default: ""

outputs:
  reviewability:
    description: >-
      §10.13 verdict from the deterministic engine. One of `PASS`,
      `WARN`, or `FAIL`. Empty string when the run failed before the
      engine produced a report (e.g. invalid input, missing token).
      Consumers branching on the verdict should compare against the
      three literals; equality against an empty string cleanly
      misses each.
    value: ${{ steps.run.outputs.reviewability }}

  report-json:
    description: >-
      §10.2 ReviewabilityReport as a single-line JSON document.
      Consumers parse it with `${{ fromJSON(steps.x.outputs.report-json) }}`
      to drive downstream steps. Always valid JSON: when the run
      failed before the engine produced a report, this falls back to
      `{}` so `fromJSON()` never crashes the consumer's workflow
      expression.
    value: ${{ steps.run.outputs.report-json }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install reviewgate-action runtime
      shell: bash
      env:
        REVIEWGATE_ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        # The Action lives at `<repo>/src/reviewgate_action/`, while
        # `pyproject.toml` (and the `reviewgate` wheel) lives at the
        # repo root two levels up. Install from that root so the engine
        # and the wrapper share the same interpreter.
        repo_root="$(cd "${REVIEWGATE_ACTION_PATH}/../.." && pwd)"
        python -m pip install --upgrade pip
        python -m pip install "${repo_root}"

    - id: run
      name: Run ReviewGate
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REVIEWGATE_FAIL_ON: ${{ inputs.fail-on }}
        REVIEWGATE_POST_COMMENT: ${{ inputs.post-comment }}
        REVIEWGATE_MODE: ${{ inputs.mode }}
        REVIEWGATE_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        case "${REVIEWGATE_FAIL_ON}" in
          PASS|WARN|FAIL|never) ;;
          *)
            echo "::error::fail-on must be one of PASS, WARN, FAIL, never (got: ${REVIEWGATE_FAIL_ON})"
            exit 2
            ;;
        esac

        case "${REVIEWGATE_POST_COMMENT}" in
          true|false) ;;
          *)
            echo "::error::post-comment must be 'true' or 'false' (got: ${REVIEWGATE_POST_COMMENT})"
            exit 2
            ;;
        esac

        case "${REVIEWGATE_MODE}" in
          auto|action|quiet) ;;
          *)
            echo "::error::mode must be one of auto, action, quiet (got: ${REVIEWGATE_MODE})"
            exit 2
            ;;
        esac

        workdir="${REVIEWGATE_WORKING_DIRECTORY:-${GITHUB_WORKSPACE}}"

        engine_input="$(mktemp -t reviewgate-input.XXXXXX.json)"
        report_json="$(mktemp -t reviewgate-report.XXXXXX.json)"
        trap 'rm -f "${engine_input}" "${report_json}"' EXIT

        # Run the fetch + run_core pipeline under `set +e` so a
        # non-zero pipeline exit (e.g. `fail-on` triggered, or a
        # fetch-time HTTP error) still falls through to the output
        # block below. We always have to publish *some* value for
        # `report-json` because consumers commonly write
        # `${{ fromJSON(steps.x.outputs.report-json) }}` in workflow
        # expressions; an empty string would crash that expression
        # at evaluation time. The fallback below emits an empty
        # JSON object instead so `fromJSON` always succeeds, and
        # consumers branch on `reviewability` (which is empty when
        # no engine run happened).
        set +e
        python -m reviewgate_action.fetch_pr --output "${engine_input}"
        fetch_exit=$?
        if [ "${fetch_exit}" -eq 0 ]; then
          python -m reviewgate_action.run_core \
            --input "${engine_input}" \
            --workspace "${workdir}" \
            --fail-on "${REVIEWGATE_FAIL_ON}" \
            --mode "${REVIEWGATE_MODE}" \
            --post-comment "${REVIEWGATE_POST_COMMENT}" \
            --output-json "${report_json}" \
            > /dev/null
          pipeline_exit=$?
        else
          pipeline_exit=${fetch_exit}
        fi
        set -e

        # Surface the §10.13 verdict and the full §10.2 report as
        # step outputs. The report goes in compact form because
        # GitHub's `GITHUB_OUTPUT` does not handle multi-line JSON
        # cleanly without explicit heredoc handling, and downstream
        # `fromJSON` parses single-line JSON without issue.
        if [ -s "${report_json}" ]; then
          reviewability="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["reviewability"])' "${report_json}")"
          report_oneline="$(python -c 'import json,sys; print(json.dumps(json.load(open(sys.argv[1]))))' "${report_json}")"
          {
            echo "reviewability=${reviewability}"
            echo "report-json=${report_oneline}"
          } >> "${GITHUB_OUTPUT}"
        else
          # Engine never produced a report (fetch failed, run_core
          # exited 2, etc.). `reviewability` stays empty so equality
          # checks against `PASS` / `WARN` / `FAIL` cleanly miss;
          # `report-json` falls back to `{}` so `fromJSON()` keeps
          # working in consumer expressions.
          {
            echo "reviewability="
            echo "report-json={}"
          } >> "${GITHUB_OUTPUT}"
        fi

        exit "${pipeline_exit}"
